  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_database:
  firebase_messaging:
  flutter_svg:
  keyboard_actions: ^4.0.1
  webview_flutter:
  firebase_core_platform_interface:
  connectivity_plus: ^6.0.3
