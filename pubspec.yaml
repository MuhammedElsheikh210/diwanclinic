  carousel_slider: ^4.2.1
  uuid: ^3.0.7
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  font_awesome_flutter: ^10.7.0
  firebase_storage: ^12.3.0
  http_parser: ^4.1.0
