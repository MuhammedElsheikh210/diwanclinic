  path_provider: ^2.1.5
  flutter_pdfview:
  flutter_downloader:
  permission_handler: ^11.3.1
  flutter_screenutil: ^5.9.3
  sqflite: ^2.4.2
  collection: ^1.19.1
  pie_chart: ^5.3.2
  photo_view: ^0.15.0
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2
  share_plus:
  excel: ^4.0.3








  path: any
  intl: any
  shared_preferences: any
  lottie: ^3.0.0
  googleapis_auth: ^1.4.1
  flutter_image_compress: ^2.4.0
  lucide_icons: ^0.257.0
  firebase_remote_config: ^5.5.0
  package_info_plus: ^9.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.3.3
  json_serializable:
  flutter_native_splash: any




flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/medicines.db
    - assets/config/pos-app-c2ced-11a26831ba47.json


  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBMPlexSansArabic-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Thin.ttf
          weight: 100


flutter_native_splash:
  color: "#e7fcea"
  image: assets/images/splash.png

  android: true
  ios: true
  fullscreen: true

  # ⚠️ مهم جدًا لأندرويد 12+
  android_12:
    color: "#e7fcea"
    image: assets/images/splash.png
    icon_background_color: "#e7fcea"

  # iOS settings
  ios_content_mode: scaleAspectFit

